parameters:
  - $ref: '#/components/parameters/account_id'
  - name: contact_id
    in: path
    required: true
    schema:
      type: number
    description: ID of the group contact

post:
  tags:
    - Groups
  operationId: contact-group-settings-toggle-join-approval
  summary: Toggle Join Approval
  description: Enables or disables join approval mode for the WhatsApp group. When enabled, new members must be approved by an admin before joining.
  security:
    - userApiKey: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - mode
          properties:
            mode:
              type: string
              enum: ['on', 'off']
              description: Whether to enable or disable join approval
  responses:
    '200':
      description: Join approval mode updated successfully
    '401':
      description: Unauthorized
    '422':
      description: Provider unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/bad_request_error'
