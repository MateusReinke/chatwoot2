name: Build and Push EagleTalks Chatwoot Image

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: eagletalks-chatwoot-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (develop)
        if: github.ref == 'refs/heads/develop'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/eagletelecomunicacoes/eagletalks-chatwoot:develop
            ghcr.io/eagletelecomunicacoes/eagletalks-chatwoot:develop-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (main)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/eagletelecomunicacoes/eagletalks-chatwoot:latest
            ghcr.io/eagletelecomunicacoes/eagletalks-chatwoot:main-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
